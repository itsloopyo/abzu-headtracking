name: Release
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Extract version from tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            Write-Host "::error::Tag '$tag' is not in the form v1.2.3"
            exit 1
          }
          $version = $Matches[1]
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Release version: $version"

      - name: Validate version matches CMakeLists.txt
        shell: pwsh
        run: |
          $cmake = Get-Content CMakeLists.txt -Raw
          if ($cmake -notmatch 'project\(\s*AbzuHeadTracking\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)') {
            Write-Host "::error::Could not parse VERSION from CMakeLists.txt project() declaration"
            exit 1
          }
          $cmakeVersion = $Matches[1]
          if ($cmakeVersion -ne $env:VERSION) {
            Write-Host "::error::Tag version $($env:VERSION) does not match CMakeLists.txt version $cmakeVersion"
            exit 1
          }
          Write-Host "Version match confirmed: $cmakeVersion"

      # C++ toolchain for the pixi `package` task's cmake/msbuild build.
      - name: Setup Visual Studio environment
        uses: microsoft/setup-msbuild@v3

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      # Same command as build.yml and developers run - no build logic in YAML.
      - name: Build and package
        shell: pwsh
        run: pixi run package

      - name: Generate release notes
        shell: pwsh
        run: |
          & cameraunlock-core/scripts/generate-release-notes.ps1 `
            -Version $env:VERSION `
            -ProjectName 'AbzuHeadTracking' `
            -ArtifactPaths @('src/', 'cameraunlock-core/', 'scripts/install.cmd', 'scripts/uninstall.cmd') `
            -OutputFile release-notes.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Release notes generation failed"
            exit 1
          }

      - name: Find release ZIPs
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Filter '*-installer.zip' -ErrorAction SilentlyContinue | Select-Object -First 1
          $nexus = Get-ChildItem -Path release -Filter '*-nexus.zip' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
            Write-Host "::error::Installer ZIP not found in release/"
            exit 1
          }
          if (-not $nexus) {
            Write-Host "::error::Nexus ZIP not found in release/"
            exit 1
          }
          "INSTALLER_ZIP=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "NEXUS_ZIP=$($nexus.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Found: $($installer.Name), $($nexus.Name)"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            --title "AbzuHeadTracking $($env:GITHUB_REF_NAME)" `
            --notes-file release-notes.txt `
            "$env:INSTALLER_ZIP" `
            "$env:NEXUS_ZIP"
