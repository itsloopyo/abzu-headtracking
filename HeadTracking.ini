; Abzu Head Tracking - configuration
; Sits in AbzuGame\Binaries\Win64\ next to AbzuHeadTracking.asi.
; This is the file the mod reads. Section/key names match the parser exactly
; (the reader is case-insensitive).

[Network]
; UDP port the OpenTrack-compatible tracker sends to. Default 4242.
UdpPort = 4242

[Tracking]
; Per-axis sensitivity. 1.0 = 1:1 with tracker.
YawSensitivity   = 1.0
PitchSensitivity = 1.0
RollSensitivity  = 1.0

; Per-axis inversion.
InvertYaw   = false
InvertPitch = false
InvertRoll  = true

; Deadzone in degrees (applied to all axes). 0 = off.
Deadzone = 0.0

; 0.0 - 1.0. Internal floor of 0.15 is enforced (see CameraUnlock doctrine).
Smoothing = 0.0

[Hotkeys]
; Win32 VK names (or a numeric VK like 0x22). Ctrl+Shift+T/Y/G/H chord
; alternatives are baked into the hotkey poller for keyboards without a nav
; cluster.
RecenterKey = Home
ToggleKey   = End
YawModeKey  = PageDown
; Cycles the DOF mode: 6DOF (rotation + position) -> 3DOF rotation only ->
; 3DOF position only -> back to 6DOF.
PositionKey = PageUp

[Camera]
; How head tracking reaches the rendered view.
;   controlrotation : write AController::ControlRotation. COUPLES head movement
;                     to the swim/control basis (the diver steers with your head).
;   updatecamera    : decoupled. Hook APlayerCameraManager::UpdateCamera and add
;                     the head delta to the rendered camera-cache rotation only,
;                     leaving ControlRotation clean.
Mode = updatecamera

; Yaw axis. true (default) = horizon-locked: head-yaw rotates around the world
; up-axis regardless of camera pitch ("up" stays constant). false = camera-local:
; head-yaw rotates around the camera's current up-axis, which leans/rolls the view
; at extreme pitch. Toggle live in-game with PageDown (or Ctrl+Shift+H).
WorldSpaceYaw = true

; Confirmed for ABZU (AbzuGame-Win64-Shipping.exe, UE 4.12) by static RE +
; in-game vtable dump (see .lab/NOTES.md):
;   UpdateCamera = PCM vtable slot 196 (FUN_1412e87b0, RVA 0x12E87B0).
;   PovOffset    = 0x404 : the camera-cache FRotator the renderer reads
;                          (UpdateCamera copies ViewTarget.POV.Rotation into it).
; CacheOffset is an optional 2nd FRotator to nudge (0 = off). Writing
; ViewTarget.POV.Rotation (0xBD4) here had no render effect - UpdateCamera has
; already copied it into the 0x404 cache by the time our hook runs - so it stays
; off. Only 0x404 matters.
UpdateCameraSlot = 196
PovOffset        = 0x404
CacheOffset      = 0

; Discovery diagnostics (read-only). Leave off for normal play.
DumpVtable = false
WatchPov   = false

[Position]
; 6DOF positional tracking. Decoupled exactly like rotation: the head offset is
; added to the rendered camera-cache Location only, never to anything game logic
; reads. PageUp (or Ctrl+Shift+G) cycles 6DOF -> rotation-only -> position-only.
; Enabled here is the startup state: true = start in 6DOF, false = start in
; 3DOF rotation only.
Enabled = true

; Per-axis sensitivity (1.0 = 1:1 with tracker). X = sway (left/right),
; Y = heave (up/down), Z = surge (forward/back).
SensitivityX = 1.0
SensitivityY = 1.0
SensitivityZ = 1.0

; Per-axis inversion.
InvertX = true
InvertY = false
InvertZ = true

; Travel limits in meters. Z is asymmetric: more range forward (LimitZ) than
; backward (LimitZBack) so leaning back does not clip through the diver.
LimitX     = 0.30
LimitY     = 0.20
LimitZ     = 0.40
LimitZBack = 0.10

; 0.0 - 1.0. Internal floor of 0.15 is enforced (see CameraUnlock doctrine).
Smoothing = 0.15

; PCM-relative FVector the renderer reads (FMinimalViewInfo.Location), sitting
; immediately before the rotation at PovOffset. For ABZU that is PovOffset - 0xC.
; Meters are scaled to UE world units (cm) at the injection site. 0 = off.
LocationOffset = 0x3F8

[Logging]
LogToFile = true
LogPath   = AbzuHeadTracking.log
